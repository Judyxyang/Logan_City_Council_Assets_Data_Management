<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logan City Council — Transport Asset Data</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{
  --bg:#04080f;--surface:#0a1220;--surface2:#0e1a2e;--border:#162338;
  --text:#cbd5e1;--muted:#475569;--a1:#38bdf8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:linear-gradient(rgba(56,189,248,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,0.02) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:1600px;margin:0 auto;padding:28px 20px 80px}
header{text-align:center;margin-bottom:32px}
.hbadge{display:inline-flex;align-items:center;gap:6px;background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);border-radius:20px;padding:4px 14px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--a1);margin-bottom:10px}
header h1{font-size:clamp(20px,3.5vw,42px);font-weight:300;color:#fff;letter-spacing:-1px}
header h1 span{color:var(--a1);font-weight:600}
header p{margin-top:8px;color:var(--muted);font-size:12px;max-width:580px;margin-inline:auto}
.stats{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:30px;padding:5px 13px;display:flex;align-items:center;gap:6px}
.stat-n{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:var(--a1)}
.stat-l{font-size:10px;color:var(--muted)}
/* Tabs */
.fc-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.fc-tab{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:11px;color:var(--muted);transition:all .2s;font-family:'DM Sans',sans-serif}
.fc-tab:hover{border-color:var(--tc,var(--a1));color:#fff}
.fc-tab.active{border-color:var(--tc,var(--a1));background:color-mix(in srgb,var(--tc,var(--a1)) 12%,transparent);color:#fff}
.fc-tab .dot{width:7px;height:7px;border-radius:50%;background:var(--tc,var(--a1));flex-shrink:0}
/* Panel */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.panel-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.panel-icon{font-size:20px}
.panel-title{font-size:15px;font-weight:600;color:#fff}
.panel-desc{font-size:11px;color:var(--muted);margin-top:1px}
.panel-count{margin-left:auto;font-family:'Space Mono',monospace;font-size:10px;padding:3px 8px;border-radius:12px;background:color-mix(in srgb,var(--pc,#38bdf8) 12%,transparent);border:1px solid color-mix(in srgb,var(--pc,#38bdf8) 25%,transparent);color:var(--pc,#38bdf8)}
/* Toolbar */
.toolbar{display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.search-wrap{flex:1;min-width:160px;position:relative}
.search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px 10px 6px 28px;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;outline:none}
.search-wrap input:focus{border-color:var(--a1)}
.search-wrap::before{content:'🔍';position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px;pointer-events:none}
.filter-select{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--text);font-size:11px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer}
.filter-select:focus{border-color:var(--a1)}
.btn{background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);border-radius:7px;padding:6px 12px;color:var(--a1);font-size:11px;cursor:pointer;font-family:'Space Mono',monospace;letter-spacing:1px;transition:all .2s;white-space:nowrap}
.btn:hover{background:rgba(56,189,248,0.15)}
.result-count{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;white-space:nowrap}
/* Table */
.table-wrap{overflow-x:auto;max-height:500px;overflow-y:auto}
.table-wrap::-webkit-scrollbar{width:4px;height:4px}
.table-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
table{width:100%;border-collapse:collapse;font-size:11px}
thead tr{background:var(--surface2);position:sticky;top:0;z-index:2}
th{padding:9px 12px;text-align:left;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);white-space:nowrap;cursor:pointer;user-select:none;border-bottom:1px solid var(--border)}
th:hover{color:var(--a1)}
th.sort-asc::after{content:' ▲';color:var(--a1)}
th.sort-desc::after{content:' ▼';color:var(--a1)}
td{padding:8px 12px;border-bottom:1px solid rgba(22,35,56,0.6);white-space:nowrap;color:var(--text)}
tr:hover td{background:rgba(56,189,248,0.03)}
.badge{display:inline-block;font-size:9px;font-family:'Space Mono',monospace;padding:1px 6px;border-radius:3px;background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);color:var(--a1)}
.score-bar{display:flex;align-items:center;gap:5px}
.score-fill{height:5px;border-radius:3px;min-width:4px}
.score-val{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted)}
.no-data{padding:40px;text-align:center;color:var(--muted);font-size:13px}
/* Detail modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;max-width:700px;width:100%;max-height:85vh;overflow-y:auto;padding:24px}
.modal::-webkit-scrollbar{width:4px}.modal::-webkit-scrollbar-thumb{background:var(--border)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:14px;font-weight:600;color:#fff}
.modal-close{background:var(--surface2);border:1px solid var(--border);border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:14px}
.modal-close:hover{color:#fff}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:500px){.field-grid{grid-template-columns:1fr}}
.field-item{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px 10px}
.field-key{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.field-val{font-size:12px;color:var(--text);word-break:break-word}
.field-val.empty{color:var(--muted);font-style:italic}
</style>
</head>

<div class="wrap">
  <header>
    <div class="hbadge">🗺️ Synthetic Asset Data</div>

    <div class="toolbar" id="toolbar"></div>
    <div class="table-wrap" id="table-wrap"></div>
  </div>
</div>
<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <div class="modal-header">

  </div>
</div>

const META = {"01_PavementAreas": {"label": "Pavement Areas", "icon": "\ud83d\udee3\ufe0f", "color": "#38bdf8", "desc": "Road pavement segments across Logan LGA"}, "02_Pathways": {"label": "Pathways & Cycleways", "icon": "\ud83d\udeb6", "color": "#34d399", "desc": "Pedestrian paths, cycleways and shared trails"}, "03_Bridges": {"label": "Bridges", "icon": "\ud83c\udf09", "color": "#fb923c", "desc": "Bridge assemblies including decks, piers and bearings"}, "04_TrafficSignals": {"label": "Traffic Signals", "icon": "\ud83d\udea6", "color": "#f472b6", "desc": "Signalised intersections and pedestrian crossings"}, "05_LineMarking": {"label": "Line Marking", "icon": "\u3030\ufe0f", "color": "#facc15", "desc": "Pavement markings \u2014 linear, area and symbols"}, "06_BusStopInfrastructure": {"label": "Bus Stop Infrastructure", "icon": "\ud83d\ude8c", "color": "#a78bfa", "desc": "Bus stops, shelters and associated infrastructure"}, "07_ParkingAreas": {"label": "Parking Areas", "icon": "\ud83c\udd7f\ufe0f", "color": "#2dd4bf", "desc": "On-street and off-street parking facilities"}, "08_RoadSafetyBarriers": {"label": "Road Safety Barriers", "icon": "\ud83d\udee1\ufe0f", "color": "#f87171", "desc": "Flexible, semi-rigid and rigid safety barrier assets"}};

let currentKey = null;
let filteredRows = [];
let sortCol = null;
let sortDir = 1;
let searchVal = '';
let filterCol = '';
let filterVal = '';

function scoreColor(v) {
  const n = parseFloat(v);
  if (isNaN(n)) return '#475569';
  if (n >= 7) return '#34d399';
  if (n >= 4) return '#facc15';
  return '#f87171';
}

function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = Object.entries(META).map(([k,m]) => `
    <div class="fc-tab ${currentKey===k?'active':''}" style="--tc:${m.color}" onclick="selectTab('${k}')">
      <span class="dot"></span>
      <span>${m.icon} ${m.label}</span>
    </div>
  `).join('');
}

function selectTab(key) {
  currentKey = key;
  sortCol = null; sortDir = 1;
  searchVal = ''; filterCol = ''; filterVal = '';
  renderTabs();
  renderPanel();
}

function renderPanel() {
  const meta = META[currentKey];
  const rows = DATA[currentKey];
  const cols = Object.keys(rows[0]);

  // header
  document.getElementById('panel-header').innerHTML = `
    <div class="panel-icon">${meta.icon}</div>
    <div>
      <div class="panel-title">${meta.label}</div>
      <div class="panel-desc">${meta.desc}</div>
    </div>
    <div class="panel-count" style="--pc:${meta.color}">${rows.length} records</div>
  `;
  document.querySelector('.panel').style.borderColor = meta.color + '44';

  // toolbar
  const filterableCols = cols.filter(c => {
    const vals = [...new Set(rows.map(r=>r[c]).filter(v=>v))];
    return vals.length <= 12 && vals.length > 1;
  });
  document.getElementById('toolbar').innerHTML = `
    <div class="search-wrap">
      <input type="text" placeholder="Search all fields…" value="${searchVal}" oninput="onSearch(this.value)" />
    </div>
    ${filterableCols.length ? `
    <select class="filter-select" onchange="onFilter('${filterableCols[0]}', this.value)">
      <option value="">Filter: ${filterableCols[0]}</option>
      ${[...new Set(rows.map(r=>r[filterableCols[0]]).filter(v=>v))].sort().map(v=>`<option value="${v}" ${filterCol===filterableCols[0]&&filterVal===v?'selected':''}>${v}</option>`).join('')}
    </select>` : ''}
    <span class="result-count" id="result-count"></span>
    <button class="btn" onclick="downloadCSV()">⬇ CSV</button>
  `;

  applyFilters();
}

function applyFilters() {
  const rows = DATA[currentKey];
  let r = rows.slice();
  if (searchVal) {
    const q = searchVal.toLowerCase();
    r = r.filter(row => Object.values(row).some(v => v && v.toLowerCase().includes(q)));
  }
  if (filterCol && filterVal) {
    r = r.filter(row => row[filterCol] === filterVal);
  }
  if (sortCol) {
    r.sort((a,b) => {
      const va = a[sortCol] || '', vb = b[sortCol] || '';
      const na = parseFloat(va), nb = parseFloat(vb);
      if (!isNaN(na) && !isNaN(nb)) return (na - nb) * sortDir;
      return va.localeCompare(vb) * sortDir;
    });
  }
  filteredRows = r;
  document.getElementById('result-count').textContent = `${r.length} / ${rows.length}`;
  renderTable(r);
}

function renderTable(rows) {
  if (!rows.length) {
    document.getElementById('table-wrap').innerHTML = '<div class="no-data">No records match the current filter.</div>';
    return;
  }
  const cols = Object.keys(rows[0]);
  const iScore = cols.includes('ConditionScore');
  let html = '<table><thead><tr>';
  html += '<th>#</th>';
  cols.forEach(c => {
    const dir = sortCol===c ? (sortDir===1?' sort-asc':' sort-desc') : '';
    html += `<th class="${dir}" onclick="onSort('${c}')">${c}</th>`;
  });
  html += '</tr></thead><tbody>';
  rows.forEach((row, i) => {
    html += `<tr onclick="showModal(${JSON.stringify(row).replace(/"/g,'&quot;')})">`;
    html += `<td style="color:var(--muted);font-family:'Space Mono',monospace;font-size:9px">${i+1}</td>`;
    cols.forEach(c => {
      let v = row[c] || '';
      if (c === 'ConditionScore' && v) {
        const pct = (parseFloat(v)/10)*100;
        const col = scoreColor(v);
        v = `<div class="score-bar"><div class="score-fill" style="width:${pct*.6}px;background:${col}"></div><span class="score-val">${v}</span></div>`;
      } else if (c === 'AssetID' || c === 'BridgeID' || c === 'Signal_ID' || c === 'StopID') {
        v = `<span class="badge">${v}</span>`;
      } else if (v.length > 28) {
        v = `<span title="${v}">${v.slice(0,26)}…</span>`;
      }
      html += `<td>${v}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('table-wrap').innerHTML = html;
}

function onSearch(v) { searchVal = v; applyFilters(); }
function onFilter(col, val) { filterCol = col; filterVal = val; applyFilters(); }
function onSort(col) {
  if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; }
  applyFilters();
}

function showModal(rowStr) {
  const row = typeof rowStr === 'string' ? JSON.parse(rowStr) : rowStr;
  document.getElementById('modal-title').textContent = row.Name || row.AssetID || 'Record Detail';
  document.getElementById('modal-fields').innerHTML = Object.entries(row).map(([k,v]) => `
    <div class="field-item">
      <div class="field-key">${k}</div>
      <div class="field-val ${v?'':'empty'}">${v || '—'}</div>
    </div>
  `).join('');
  document.getElementById('modal').classList.add('show');
}

function closeModal(e) {
  if (e.target.id === 'modal') document.getElementById('modal').classList.remove('show');
}

function downloadCSV() {
  const rows = filteredRows;
  if (!rows.length) return;
  const cols = Object.keys(rows[0]);
  const csv = [cols.join(','), ...rows.map(r => cols.map(c => `"${(r[c]||'').replace(/"/g,'""')}"`).join(','))].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = currentKey + '_export.csv';
  a.click();
}

// Init
selectTab(Object.keys(META)[0]);
</script>
